<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양도매 재고 검색</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#fff9cc;
margin:0;
padding:12px;
}

.container{
max-width:700px;
width:100%;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
height:42px;
}

.title{
font-size:22px;
font-weight:bold;
}

.divider{
height:1px;
background:#ddd;
margin:12px 0;
}

.update-time{
text-align:center;
font-size:12px;
color:#666;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:12px;
}

.count{
text-align:center;
font-weight:bold;
font-size:17px;
color:#2c7be5;
margin-bottom:10px;
}

input{
width:100%;
padding:11px;
margin-bottom:8px;
font-size:15px;
border:1px solid #ddd;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:11px;
font-size:15px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
}

button.old{
background:#ff6b6b;
}

.person-btns{
display:flex;
gap:6px;
margin-bottom:8px;
}
.person-btns button{
flex:1;
padding:8px;
font-size:13px;
background:#6c757d;
}


table{
width:100%;
border-collapse:collapse;
font-size:13px;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
word-break:break-all;
}

th{
background:#f4f6fa;
}

.stock-green{background:#c8f7c5;}
.stock-orange{background:#ffe4b5;}
.stock-red{background:#ffc7c7;}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">고양도매 재고 검색</div>
</div>

<div class="divider"></div>

<div class="update-time">
재고 데이터 업데이트 : <span id="updateTime">확인중...</span>
</div>

<div class="card">

<div class="count">
총 재고 : <span id="total">0</span>
</div>

<input id="group" placeholder="상위그룹 검색">
<input id="model" list="modelList" placeholder="모델 검색">
<datalist id="modelList"></datalist>
<input id="color" placeholder="색상 검색">
<input id="holder" placeholder="보유처 검색">
<input id="serial" placeholder="일련번호 검색">

<button onclick="search()">검색</button>
<button class="old" onclick="oldStock()">90일 이상 재고</button>
<button onclick="holderSummary(rawData)">보유처별 재고 통계</button>

</div>

<div class="card">
<b>모델별 재고</b>
<div id="modelSummary"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>모델</th>
<th>색상</th>
<th>일련번호</th>
<th>상위그룹</th>
<th>보유처</th>
<th>출고경과일</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>

let rawData=[]

fetch("inventory.xlsx")
.then(res=>res.arrayBuffer())
.then(buffer=>{
let workbook=XLSX.read(buffer)
let sheet=workbook.Sheets[workbook.SheetNames[0]]
rawData=XLSX.utils.sheet_to_json(sheet)
render(rawData)
})

function search(){
let group=document.getElementById("group").value
let model=document.getElementById("model").value
let color=document.getElementById("color").value
let holder=document.getElementById("holder").value
let serial=document.getElementById("serial").value

let result=rawData.filter(r=>
r.상위그룹?.includes(group)
&& r.모델명?.includes(model)
&& r.색상?.includes(color)
&& r.보유처?.includes(holder)
&& r.일련번호?.includes(serial)
)

render(result)
}

/* ⭐ 2단계 구조 */
function holderSummary(data){

let summary={}
data.forEach(r=>{
let h=r.보유처||"기타"
if(!summary[h]) summary[h]=0
summary[h]++
})

let html=`
<tr>
<td colspan="6">
<div class="person-btns">
<button onclick="personFilter('준호')">준호</button>
<button onclick="personFilter('민기')">민기</button>
<button onclick="personFilter('대형')">대형</button>
<button onclick="personFilter('세미')">세미</button>
</div>
</td>
</tr>`

Object.entries(summary)
.sort((a,b)=>a[0].localeCompare(b[0],'ko'))
.forEach(([h,count])=>{
html+=`
<tr onclick="holderDetail('${h}', ${JSON.stringify(data).replace(/"/g,'&quot;')})" style="cursor:pointer">
<td colspan="5">${h}</td>
<td>${count}대</td>
</tr>`
})

document.getElementById("result").innerHTML=html
}

/* 1단계: 담당자 → 보유처 목록 */
function personFilter(name){
let filtered=rawData.filter(r=>r.보유처?.includes(name))
holderSummary(filtered)
}

/* 2단계: 보유처 → 상세 */
function holderDetail(holder, data){
let list = data || rawData
let result=list.filter(r=>r.보유처===holder)
render(result)
}

function oldStock(){
let result=rawData.filter(r=>parseInt(r.출고경과일)>=90)
render(result)
}

function render(list){
document.getElementById("total").innerText=list.length
let html=""
list.forEach(r=>{
html+=`<tr>
<td>${r.모델명||""}</td>
<td>${r.색상||""}</td>
<td>${r.일련번호||""}</td>
<td>${r.상위그룹||""}</td>
<td>${r.보유처||""}</td>
<td>${r.출고경과일||""}</td>
</tr>`
})
document.getElementById("result").innerHTML=html
}

</script>

</body>
</html>
