<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>재고 검색</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
background:white;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#007aff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="container">

<h2>📦 재고 검색</h2>

<input id="model" placeholder="모델명">
<input id="color" placeholder="색상">
<input id="owner" placeholder="보유처">

<button onclick="search()">검색</button>

<table>

<thead>
<tr>
<th>보유처</th>
<th>모델</th>
<th>색상</th>
<th>일련번호</th>
<th>출고</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>

</div>

<script>

let data=[]

async function loadExcel(){

const response = await fetch("재고.xlsx")
const arrayBuffer = await response.arrayBuffer()

const workbook = XLSX.read(arrayBuffer)

const sheet = workbook.Sheets[workbook.SheetNames[0]]

data = XLSX.utils.sheet_to_json(sheet)

}

loadExcel()

const modelRule={
"942":["S942"],
"366":["M366","A366"]
}

const colorRule={
"블랙":["블랙","제트블랙"],
"레드":["레드","코랄레드"],
"실버":["실버","실버쉐도우"]
}

function search(){

let model=document.getElementById("model").value
let color=document.getElementById("color").value
let owner=document.getElementById("owner").value

let modelList=[model]

if(modelRule[model]){
modelList=modelRule[model]
}

let colorList=[color]

if(colorRule[color]){
colorList=colorRule[color]
}

let result=data.filter(d=>

(!model || modelList.some(m=>d["모델명"]?.includes(m))) &&
(!color || colorList.some(c=>d["색상"]?.includes(c))) &&
(!owner || d["보유처"]?.includes(owner))

)

let html=""

result.forEach(r=>{

html+=`
<tr>
<td>${r["보유처"]}</td>
<td>${r["모델명"]}</td>
<td>${r["색상"]}</td>
<td>${r["일련번호"]}</td>
<td>${r["출고"]}</td>
</tr>
`

})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
