<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양도매 재고 검색</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#fff9cc;margin:0;padding:12px;}
.container{max-width:720px;width:100%;margin:auto;}
.header{display:flex;align-items:center;justify-content:center;gap:10px;}
.logo{height:42px;}
.title{font-size:22px;font-weight:bold;}
.divider{height:1px;background:#ddd;margin:12px 0;}
.update-time{text-align:center;font-size:12px;color:#666;margin-bottom:10px;}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);margin-bottom:12px;}
.count{text-align:center;font-weight:bold;font-size:17px;color:#2c7be5;margin-bottom:10px;}
input{width:100%;padding:11px;margin-bottom:8px;font-size:15px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;}
button{width:100%;padding:11px;font-size:15px;background:#2c7be5;color:white;border:none;border-radius:6px;cursor:pointer;margin-bottom:6px;}
button.old{background:#ff6b6b;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#f4f6fa;}
.stock-green{background:#c8f7c5;}
.stock-orange{background:#ffe4b5;}
.stock-red{background:#ffc7c7;}
</style>
</head>
<body>
<div class="container">

<div class="header">
<div class="title">고양도매 재고 검색</div>
</div>

<div class="divider"></div>

<div class="card">
<div class="count">총 재고 : <span id="total">0</span></div>

<input id="model" placeholder="모델 검색">
<button onclick="search()">검색</button>
<button onclick="resetView()">초기화</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>모델</th>
<th>색상</th>
<th>일련번호</th>
<th>상위그룹</th>
<th>보유처</th>
<th>출고경과일</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>
let rawData=[]

fetch("inventory.xlsx")
.then(res=>res.arrayBuffer())
.then(buffer=>{
let workbook=XLSX.read(buffer)
let sheet=workbook.Sheets[workbook.SheetNames[0]]
rawData=XLSX.utils.sheet_to_json(sheet)
render(rawData)
})

function search(){
let model=document.getElementById("model").value

let result=rawData.filter(r=>
r.모델명?.toString().includes(model)
)

renderHolderSummary(result)
}

function renderHolderSummary(list){
let summary={}

list.forEach(r=>{
let holder=r.보유처 || "기타"
if(!summary[holder]) summary[holder]=[]
summary[holder].push(r)
})

let html=""

Object.entries(summary)
.sort((a,b)=>b[1].length-a[1].length)
.forEach(([h,items])=>{
html+=`<tr onclick='showDetail(${JSON.stringify(items)})' style="cursor:pointer">
<td colspan="5">${h}</td>
<td>${items.length}대</td>
</tr>`
})

if(html=="") html="<tr><td colspan='6'>검색 결과 없음</td></tr>"

document.getElementById("result").innerHTML=html

document.getElementById("total").innerText=list.length
}

function showDetail(list){
render(list)
}

function render(list){
let html=""

list.forEach(r=>{
let days=parseInt(r.출고경과일)||0
let cls=days<=30?"stock-green":days<=90?"stock-orange":"stock-red"

html+=`<tr>
<td>${r.모델명||""}</td>
<td>${r.색상||""}</td>
<td>${r.일련번호||""}</td>
<td>${r.상위그룹||""}</td>
<td>${r.보유처||""}</td>
<td class="${cls}">${days}</td>
</tr>`
})

if(html=="") html="<tr><td colspan='6'>데이터 없음</td></tr>"

document.getElementById("result").innerHTML=html

document.getElementById("total").innerText=list.length
}

function resetView(){
render(rawData)
}
</script>

</body>
</html>
