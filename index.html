<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>고양도매 재고 검색</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#fff9cc;
margin:0;
padding:12px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
height:40px;
}

.title{
font-size:22px;
font-weight:bold;
}

.divider{
height:1px;
background:#ddd;
margin:12px 0;
}

.update{
text-align:center;
font-size:12px;
color:#666;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:12px;
}

.count{
text-align:center;
font-weight:bold;
font-size:18px;
color:#2c7be5;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:8px;
border:1px solid #ddd;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
border:none;
background:#2c7be5;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
}

button.old{
background:#ff6b6b;
}

#modelSummary{
font-size:14px;
line-height:1.6;
margin-top:6px;
}

.table-wrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#f2f4f7;
}

.stock-green{background:#c8f7c5;}
.stock-orange{background:#ffe4b5;}
.stock-red{background:#ffc7c7;}

</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">고양도매 재고 검색</div>
</div>

<div class="divider"></div>

<div class="update">
재고 업데이트 : <span id="updateTime">확인중...</span>
</div>

<div class="card">

<div class="count">
총 재고 : <span id="total">0</span>
</div>

<input id="group" placeholder="상위그룹 검색">

<input id="model" list="modelList" placeholder="모델 검색">
<datalist id="modelList"></datalist>

<input id="color" placeholder="색상 검색">

<input id="serial" placeholder="일련번호 검색">

<button onclick="search()">검색</button>

<button class="old" onclick="oldStock()">90일 이상 재고</button>

</div>

<div class="card">

<b>모델별 재고</b>

<div id="modelSummary"></div>

</div>

<div class="card table-wrap">

<table>

<thead>
<tr>
<th>모델</th>
<th>색상</th>
<th>일련번호</th>
<th>상위그룹</th>
<th>보유처</th>
<th>출고경과일</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>

</div>

</div>

<script>

let rawData=[]

fetch("inventory.xlsx")
.then(res=>{

let lastModified=res.headers.get("Last-Modified")

if(lastModified){
let date=new Date(lastModified)
document.getElementById("updateTime").innerText=date.toLocaleString("ko-KR")
}

return res.arrayBuffer()

})
.then(buffer=>{

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

rawData=XLSX.utils.sheet_to_json(sheet)

render(rawData)

makeModelList()

})

function makeModelList(){

let models=[...new Set(rawData.map(r=>r.모델))]

let html=""

models.forEach(m=>{
html+=`<option value="${m}">`
})

document.getElementById("modelList").innerHTML=html

}

function normalizeModel(model){

model=model.toUpperCase()

if(model=="942") return ["S942"]

if(model=="366") return ["M366","A366"]

return [model]

}

function normalizeColor(color){

color=color.toLowerCase()

if(color=="블랙") return ["블랙","제트블랙"]

if(color=="레드") return ["레드","코랄레드"]

if(color=="실버") return ["실버","실버쉐도우"]

return [color]

}

function search(){

let group=document.getElementById("group").value

let model=document.getElementById("model").value

let color=document.getElementById("color").value

let serial=document.getElementById("serial").value

let modelGroup=normalizeModel(model)

let colorGroup=normalizeColor(color)

let result=rawData.filter(r=>{

return r.상위그룹?.toString().includes(group)
&& modelGroup.some(m=>r.모델?.toString().includes(m))
&& colorGroup.some(c=>r.색상?.toString().includes(c))
&& r.일련번호?.toString().includes(serial)

})

render(result)

}

function oldStock(){

let result=rawData.filter(r=>parseInt(r.출고경과일)>=90)

render(result)

}

function render(list){

document.getElementById("total").innerText=list.length

let html=""

list.forEach(r=>{

let days=parseInt(r.출고경과일)||0

let cls=""

if(days<=30) cls="stock-green"
else if(days<=90) cls="stock-orange"
else cls="stock-red"

html+=`
<tr>
<td>${r.모델||""}</td>
<td>${r.색상||""}</td>
<td>${r.일련번호||""}</td>
<td>${r.상위그룹||""}</td>
<td>${r.보유처||""}</td>
<td class="${cls}">${days}</td>
</tr>
`

})

document.getElementById("result").innerHTML=html

updateModelSummary(list)

}

function updateModelSummary(list){

let summary={}

list.forEach(r=>{

let m=r.모델||"기타"

if(!summary[m]) summary[m]=0

summary[m]++

})

let html=""

Object.keys(summary).sort().forEach(m=>{

html+=`${m} : ${summary[m]}대<br>`

})

document.getElementById("modelSummary").innerHTML=html

}

</script>

</body>
</html>
