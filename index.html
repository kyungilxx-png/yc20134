<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양도매 재고 검색</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
    /* 모든 요소의 박스 크기 계산 방식 고정 (오른쪽 넘침 방지) */
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        background: #fff9cc;
        margin: 0;
        padding: 10px;
        overflow-x: hidden; 
    }

    .container {
        max-width: 720px;
        width: 100%;
        margin: auto;
    }

    .header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px 0;
    }

    .logo { height: 35px; }
    .title { font-size: 20px; font-weight: bold; }

    .update-time {
        text-align: center;
        font-size: 11px;
        color: #666;
        margin-bottom: 10px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin-bottom: 12px;
        width: 100%; 
    }

    .count {
        text-align: center;
        font-weight: bold;
        font-size: 17px;
        color: #2c7be5;
        margin-bottom: 12px;
    }

    input, button.main-btn {
        width: 100%; 
        padding: 12px;
        margin-bottom: 8px;
        font-size: 15px;
        border-radius: 6px;
        border: 1px solid #ddd;
    }

    button.main-btn {
        background: #2c7be5;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 5px;
    }

    button.main-btn.old { background: #ff6b6b; }

    .group-container {
        display: none; 
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 5px;
        margin-bottom: 5px;
    }

    .btn-group {
        background: #5c6bc0;
        color: white;
        border: none;
        padding: 12px;
        font-size: 14px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        table-layout: fixed; 
    }

    th, td {
        border: 1px solid #eee;
        padding: 8px 4px;
        text-align: center;
        word-break: break-all;
    }

    th { background: #f8f9fa; color: #333; }

    .stock-green { background: #c8f7c5; }
    .stock-orange { background: #ffe4b5; }
    .stock-red { background: #ffc7c7; }

    #modelSummary { font-size: 13px; line-height: 1.6; }

    @media (max-width: 600px) {
        table thead { display: none; }
        table, tbody, tr, td { display: block; width: 100%; }
        tr {
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            background: #fff;
        }
        td {
            text-align: left;
            border: none;
            padding: 4px 0;
            display: flex;
            border-bottom: 1px dotted #eee;
        }
        td:last-child { border-bottom: none; }
        td::before {
            content: attr(data-label); 
            font-weight: bold;
            width: 90px;
            flex-shrink: 0;
            color: #555;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" class="logo" alt="로고">
        <div class="title">고양도매 재고 검색</div>
    </div>
    
    <div class="update-time">데이터 업데이트 : <span id="updateTime">-</span></div>
    
    <div class="card">
        <div class="count">총 재고 : <span id="total">0</span></div>
        
        <input id="model" list="modelList" placeholder="모델 검색">
        <datalist id="modelList"></datalist>
        <input id="color" placeholder="색상 검색">
        <input id="holder" placeholder="보유처 검색">
        <input id="serial" placeholder="일련번호 검색">
        
        <button class="main-btn" onclick="search()">검색</button>
        <button class="main-btn old" onclick="oldStock()">90일 이상 재고</button>
        <button class="main-btn" onclick="toggleGroups()">보유처별 재고 통계</button>
        
        <div id="groupButtons" class="group-container">
            <button class="btn-group" onclick="filterByHolder('민기')">민기</button>
            <button class="btn-group" onclick="filterByHolder('준호')">준호</button>
            <button class="btn-group" onclick="filterByHolder('대형')">대형</button>
            <button class="btn-group" onclick="filterByHolder('세미')">세미</button>
        </div>
    </div>
    
    <div class="card">
        <div style="font-weight:bold; margin-bottom:10px; font-size:14px;">[모델별 요약]</div>
        <div id="modelSummary"></div>
    </div>
    
    <div class="card" style="padding: 5px;">
        <table>
            <thead>
                <tr>
                    <th style="width:25%;">모델</th>
                    <th>색상</th>
                    <th style="width:20%;">일련번호</th>
                    <th>보유처</th>
                    <th style="width:15%;">경과일</th>
                </tr>
            </thead>
            <tbody id="result"></tbody>
        </table>
    </div>
</div>

<script>
let rawData=[];
let currentList=[];

fetch("inventory.xlsx")
.then(res => res.arrayBuffer())
.then(buffer => {
    let workbook = XLSX.read(buffer);
    let sheet = workbook.Sheets[workbook.SheetNames[0]];
    rawData = XLSX.utils.sheet_to_json(sheet);
    render(rawData);
    makeModelList();
    document.getElementById("updateTime").innerText = new Date().toLocaleString();
});

function makeModelList(){
    let models = [...new Set(rawData.map(r => r.모델명).filter(Boolean))];
    let html = "";
    models.forEach(m => { html += `<option value="${m}">` });
    document.getElementById("modelList").innerHTML = html;
}

function normalizeModel(model){
    if(!model) return [];
    model = model.toUpperCase().trim();
    if(model=="942") return ["S942"];
    if(model=="366") return ["M366","A366"];
    return [model];
}

function normalizeColor(color){
    if(!color) return [];
    color = color.toLowerCase().trim();
    if(color=="블랙") return ["블랙","제트블랙"];
    if(color=="레드") return ["레드","코랄레드"];
    return [color];
}

function search(){
    hideGroups();
    let model = document.getElementById("model").value.trim();
    let color = document.getElementById("color").value.trim();
    let holder = document.getElementById("holder").value.trim();
    let serial = document.getElementById("serial").value.trim();
    
    let modelGroup = normalizeModel(model);
    let colorGroup = normalizeColor(color);

    let result = rawData.filter(row => {
        return (model === "" || modelGroup.some(m=>(row.모델명||"").toString().includes(m)))
        && (color === "" || colorGroup.some(c=>(row.색상||"").toString().includes(c)))
        && (row.보유처||"").toString().includes(holder)
        && (row.일련번호||"").toString().includes(serial);
    });
    currentList = result;
    
    if(model && result.length > 0) showHolderColorSummary(result);
    else render(result);
}

function showHolderColorSummary(list){
    let summary = {};
    list.forEach(r => {
        let h = r.보유처||"기타"; let c = r.색상||"기타";
        if(!summary[h]) summary[h] = {};
        if(!summary[h][c]) summary[h][c] = 0;
        summary[h][c]++;
    });
    let html = "";
    Object.keys(summary).sort().forEach(h => {
        let colorText = Object.entries(summary[h]).map(([c,cnt])=>`${c}${cnt}`).join("/");
        html += `<tr onclick="holderDetailFromSearch('${h}')" style="cursor:pointer; background:#fdfdfd;"><td colspan="3" style="text-align:left; padding-left:10px;">${h}</td><td colspan="2" style="color:#2c7be5; font-size:11px;">${colorText}</td></tr>`;
    });
    document.getElementById("result").innerHTML = html;
    document.getElementById("total").innerText = list.length;
    updateModelSummary(list);
}

function holderDetailFromSearch(h){ render(currentList.filter(r => r.보유처 === h)); }

function oldStock(){ hideGroups(); render(rawData.filter(r => parseInt(r.출고경과일) >= 90)); }

function toggleGroups(){
    let g = document.getElementById("groupButtons");
    g.style.display = (g.style.display === "grid") ? "none" : "grid";
    if(g.style.display === "grid") holderSummary(rawData);
}

function hideGroups(){ document.getElementById("groupButtons").style.display = "none"; }

function filterByHolder(k){ holderSummary(rawData.filter(r => (r.보유처||"").includes(k))); }

function holderSummary(list){
    let s = {};
    list.forEach(r => { let h = r.보유처||"기타"; s[h] = (s[h]||0)+1; });
    let html = "";
    Object.entries(s).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([h, count]) => {
        html += `<tr onclick="holderDetail('${h}')" style="cursor:pointer;"><td colspan="4" style="text-align:left; padding-left:10px;">${h}</td><td>${count}대</td></tr>`;
    });
    document.getElementById("result").innerHTML = html;
    document.getElementById("total").innerText = list.length;
    updateModelSummary(list);
}

function holderDetail(h){ render(rawData.filter(r => r.보유처 === h)); }

function render(list){
    list.sort((a,b) => (b.모델명||"").toString().localeCompare((a.모델명||"").toString()));
    document.getElementById("total").innerText = list.length;
    let html = "";
    list.forEach(r => {
        let d = parseInt(r.출고경과일)||0;
        let c = (d<=30) ? "stock-green" : (d<=90) ? "stock-orange" : "stock-red";
        html += `<tr>
            <td data-label="모델">${r.모델명||""}</td>
            <td data-label="색상">${r.색상||""}</td>
            <td data-label="일련번호">${r.일련번호||""}</td>
            <td data-label="보유처">${r.보유처||""}</td>
            <td data-label="경과일" class="${c}">${d}</td>
        </tr>`;
    });
    document.getElementById("result").innerHTML = html || "<tr><td colspan='5'>결과 없음</td></tr>";
    updateModelSummary(list);
}

function updateModelSummary(list){
    let s = {}; list.forEach(r => { if(r.모델명) s[r.모델명] = (s[r.모델명]||0)+1; });
    let html = "";
    Object.keys(s).sort().forEach(m => {
        html += `<span style="display:inline-block; margin-right:10px;">${m}:<b>${s[m]}</b></span> `;
    });
    document.getElementById("modelSummary").innerHTML = html || "-";
}
</script>
</body>
</html>
