<style>
body{
font-family:Arial;
background:#fff9cc;
margin:0;
padding:12px;
}

.container{
max-width:720px;
width:100%;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{height:42px;}
.title{font-size:22px;font-weight:bold;}

.divider{
height:1px;
background:#ddd;
margin:12px 0;
}

.update-time{
text-align:center;
font-size:12px;
color:#666;
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:12px;
overflow-x:auto; /* ✅ 추가 */
}

.count{
text-align:center;
font-weight:bold;
font-size:17px;
color:#2c7be5;
margin-bottom:10px;
}

input{
width:100%;
padding:11px;
margin-bottom:8px;
font-size:15px;
border:1px solid #ddd;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:11px;
font-size:15px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
}

button.old{background:#ff6b6b;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
word-break:break-word; /* ✅ 수정 */
}

/* ✅ 컬럼 사이즈 고정 */
th:nth-child(1), td:nth-child(1){width:16%;}
th:nth-child(2), td:nth-child(2){width:14%;}
th:nth-child(3), td:nth-child(3){width:20%;}
th:nth-child(4), td:nth-child(4){width:16%;}
th:nth-child(5), td:nth-child(5){width:18%;}
th:nth-child(6), td:nth-child(6){width:16%;}

th{background:#f4f6fa;}

.stock-green{background:#c8f7c5;}
.stock-orange{background:#ffe4b5;}
.stock-red{background:#ffc7c7;}

@media (max-width:600px){
table thead{display:none;}
table,tbody,tr,td{display:block;width:100%;}

tr{
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
padding:6px;
}

td{
text-align:left;
border:none;
padding:4px 6px;
}

td::before{
font-weight:bold;
display:inline-block;
width:70px; /* ✅ 수정 */
}

td:nth-child(1)::before{content:"모델";}
td:nth-child(2)::before{content:"색상";}
td:nth-child(3)::before{content:"일련번호";}
td:nth-child(4)::before{content:"상위그룹";}
td:nth-child(5)::before{content:"보유처";}
td:nth-child(6)::before{content:"출고경과일";}
}
</style>
