<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양도매 재고 검색</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#fff9cc;
margin:0;
padding:12px;
}

.container{
max-width:720px;
margin:auto;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.logo{height:42px;}

.title{
font-size:22px;
font-weight:bold;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:12px;
}

.count{
text-align:center;
font-weight:bold;
font-size:17px;
color:#2c7be5;
margin-bottom:10px;
}

input,button{
width:100%;
padding:10px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#2c7be5;
color:white;
cursor:pointer;
border:none;
}

button.old{background:#ff6b6b;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

.stock-green{background:#c8f7c5;}
.stock-orange{background:#ffe4b5;}
.stock-red{background:#ffc7c7;}

.holder-btn{
display:inline-block;
margin:3px 5px 3px 0;
padding:3px 8px;
background:#eef3ff;
border-radius:6px;
cursor:pointer;
color:#2c7be5;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">고양도매 재고 검색</div>
</div>

<div class="card">

<div class="count">
총 재고 : <span id="total">0</span>
</div>

<input id="group" placeholder="상위그룹">
<input id="model" placeholder="모델">
<input id="color" placeholder="색상">
<input id="holder" placeholder="보유처">
<input id="serial" placeholder="일련번호">

<button onclick="search()">검색</button>
<button class="old" onclick="oldStock()">90일 이상</button>
<button onclick="holderSummary()">보유처 통계</button>

</div>

<div class="card">
<b>모델별 재고</b>
<div id="modelSummary"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>모델</th>
<th>색상</th>
<th>일련번호</th>
<th>상위그룹</th>
<th>보유처</th>
<th>출고경과일</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>

let rawData=[]

fetch("inventory.xlsx")
.then(res=>res.arrayBuffer())
.then(buffer=>{
let workbook=XLSX.read(buffer)
let sheet=workbook.Sheets[workbook.SheetNames[0]]
rawData=XLSX.utils.sheet_to_json(sheet)
render(rawData)
})

function search(){

let group=groupInput()
let model=modelInput()
let color=colorInput()
let holder=holderInput()
let serial=serialInput()

let result=rawData.filter(r=>
(r.상위그룹||"").includes(group) &&
(r.모델명||"").includes(model) &&
(r.색상||"").includes(color) &&
(r.보유처||"").includes(holder) &&
(r.일련번호||"").includes(serial)
)

render(result)
}

function groupInput(){return document.getElementById("group").value}
function modelInput(){return document.getElementById("model").value}
function colorInput(){return document.getElementById("color").value}
function holderInput(){return document.getElementById("holder").value}
function serialInput(){return document.getElementById("serial").value}

function oldStock(){
render(rawData.filter(r=>parseInt(r.출고경과일)>=90))
}

function holderSummary(){

let summary={}

rawData.forEach(r=>{
let h=r.보유처||"기타"
summary[h]=(summary[h]||0)+1
})

let html=""

Object.entries(summary).forEach(([h,count])=>{
html+=`
<tr onclick="holderDetail('${h}')" style="cursor:pointer">
<td colspan="5">${h}</td>
<td>${count}대</td>
</tr>`
})

document.getElementById("result").innerHTML=html
}

function holderDetail(holder){
render(rawData.filter(r=>r.보유처===holder))
}

function render(list){

document.getElementById("total").innerText=list.length

let html=""

list.forEach(r=>{

let days=parseInt(r.출고경과일)||0
let cls=days<=30?"stock-green":days<=90?"stock-orange":"stock-red"

html+=`
<tr>
<td>${r.모델명||""}</td>
<td>${r.색상||""}</td>
<td>${r.일련번호||""}</td>
<td>${r.상위그룹||""}</td>
<td>${r.보유처||""}</td>
<td class="${cls}">${days}</td>
</tr>`
})

document.getElementById("result").innerHTML=html

updateModelSummary(list)
}

function updateModelSummary(list){

let summary={}

list.forEach(r=>{

let m=r.모델명||"기타"
let h=r.보유처||"기타"

if(!summary[m]){
summary[m]={total:0,holders:{}}
}

summary[m].total++
summary[m].holders[h]=(summary[m].holders[h]||0)+1

})

let html=""

Object.keys(summary).sort().forEach(m=>{

let data=summary[m]

html+=`<div style="margin-bottom:10px">`
html+=`<b>${m} : ${data.total}대</b><br>`

Object.entries(data.holders).forEach(([h,count])=>{
html+=`<span class="holder-btn" onclick="holderDetail('${h}')">${h} (${count})</span>`
})

html+=`</div>`

})

document.getElementById("modelSummary").innerHTML=html
}

</script>

</body>
</html>
